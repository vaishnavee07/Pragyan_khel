# SentraVision Configuration - RT-DETR Phase 4

[detection]
# RT-DETR model configuration
model_type = rtdetr  # rtdetr or yolo
confidence_threshold = 0.4
iou_threshold = 0.6
device = cpu  # cpu or cuda

[performance]
# Performance settings
target_fps = 15
frame_skip = 0
rolling_fps_window = 30

[alerts]
# Alert thresholds
warning_object_count = 3
critical_object_count = 5

[camera]
# Camera settings
width = 640
height = 480
backend = dshow  # dshow for Windows DirectShow
